# Legacy reference only. Production deployment now targets Vercel.
# If you use Netlify manually, keep these headers aligned with next.config.mjs.

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Opener-Policy = "same-origin"
